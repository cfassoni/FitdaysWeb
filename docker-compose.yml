services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitdays-backend
    ports:
      - "8000:8000"
    volumes:
      # Persistent SQLite database bind mount
      - ./backend/fitdays.db:/app/fitdays.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitdays-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
