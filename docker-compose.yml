services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitdays-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/fitdays.db
      - SECRET_KEY=${SECRET_KEY:-fitdays_super_secret_key_12345_change_in_production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    volumes:
      # Persistent SQLite database named volume
      - fitdays-db-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitdays-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fitdays-db-data:
    driver: local
