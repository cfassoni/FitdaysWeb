name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '📝 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🎨 Style'
    labels:
      - 'style'
  - title: '⚙️ Refactors'
    labels:
      - 'refactor'
  - title: '⚡ Performance'
    labels:
      - 'perf'
  - title: '🧪 Tests'
    labels:
      - 'test'
  - title: '👷 CI/CD'
    labels:
      - 'ci'
      - 'build'
  - title: '🧹 Chores & Maintenance'
    labels:
      - 'chore'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
template: |
  ## What's Changed

  $CHANGES
